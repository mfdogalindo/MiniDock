{{define "setup.html"}}
<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Configurar MiniDock</title><style>body{font-family:system-ui,sans-serif;max-width:36rem;margin:4rem auto;padding:0 1rem;color:#172033}label,input,button{display:block;width:100%;box-sizing:border-box;margin-top:.65rem}input,button{padding:.7rem;font:inherit}.error{color:#a11}</style></head><body><main><h1>Configurar MiniDock</h1><p>Define la contraseña maestra que protegerá los secretos. No se almacenará y será necesaria tras reiniciar el servicio.</p>{{with .Error}}<p class="error">{{.}}</p>{{end}}<form method="post" action="/setup"><label for="password">Contraseña maestra</label><input id="password" name="password" type="password" minlength="12" required autofocus><label for="password_confirmation">Confirmar contraseña</label><input id="password_confirmation" name="password_confirmation" type="password" minlength="12" required><button type="submit">Inicializar</button></form></main></body></html>
{{end}}
